name: Latest blog posts

on:
  schedule:
    # Runs every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull in pwsh.in RSS feed
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://pwsh.in/index.xml"
          max_post_count: 5
          commit_message: "chore: update blog post list"

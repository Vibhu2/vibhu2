name: Update PSGallery module stats

on:
  schedule:
    # Runs daily at midnight IST (18:30 UTC)
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-psgallery-stats:
    name: Fetch PSGallery version + downloads and update README
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch PSGallery stats and update README
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import re

          MODULES = ["VB.WorkstationReport", "VB.NextCloud", "VB.ServerInventory"]
          README_PATH = "README.md"

          with open(README_PATH, "r", encoding="utf-8") as f:
              readme = f.read()

          for module in MODULES:
              url = f"https://www.powershellgallery.com/api/v2/FindPackagesById()?id='{module}'&\$filter=IsLatestVersion+eq+true&\$select=Id,Version,DownloadCount"
              try:
                  req = urllib.request.Request(url, headers={"Accept": "application/json"})
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read().decode())
                  entry = data.get("d", {}).get("results", [{}])[0]
                  version = entry.get("Version", "")
                  downloads = entry.get("DownloadCount", 0)
              except Exception as e:
                  print(f"WARNING: Could not fetch {module}: {e}")
                  continue

              if not version:
                  print(f"WARNING: Empty version for {module}, skipping.")
                  continue

              dl_formatted = f"{int(downloads):,}"
              print(f"{module}: v{version}, {dl_formatted} downloads")

              ver_badge = f"![v{version}](https://img.shields.io/badge/version-{version}-5391FE?style=flat)"
              dl_badge = f"![{dl_formatted} downloads](https://img.shields.io/badge/downloads-{dl_formatted.replace(',', '--')}-5391FE?style=flat)"

              readme = re.sub(
                  rf"(<!-- PSGALLERY-VERSION:{re.escape(module)} -->).*?(<!-- /PSGALLERY-VERSION:{re.escape(module)} -->)",
                  rf"\1{ver_badge}\2",
                  readme, flags=re.DOTALL
              )
              readme = re.sub(
                  rf"(<!-- PSGALLERY-DL:{re.escape(module)} -->).*?(<!-- /PSGALLERY-DL:{re.escape(module)} -->)",
                  rf"\1{dl_badge}\2",
                  readme, flags=re.DOTALL
              )

          with open(README_PATH, "w", encoding="utf-8") as f:
              f.write(readme)

          print("README updated successfully.")
          PYEOF

      - name: Commit updated README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit." || (git commit -m "chore: update PSGallery module stats [skip ci]" && git push)

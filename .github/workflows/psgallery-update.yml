name: Update PSGallery module stats

on:
  schedule:
    # Runs daily at midnight IST (18:30 UTC)
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-psgallery-stats:
    name: Fetch PSGallery version + downloads and update README
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch PSGallery stats and update README
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import re
          import xml.etree.ElementTree as ET

          README_PATH = "README.md"

          ns = {
              "atom": "http://www.w3.org/2005/Atom",
              "d":    "http://schemas.microsoft.com/ado/2007/08/dataservices",
              "m":    "http://schemas.microsoft.com/ado/2007/08/dataservices/metadata",
          }

          def fetch_module(mod_id):
              """Fetch a single module by exact Id — returns (version, downloads) or None."""
              url = (
                  f"https://www.powershellgallery.com/api/v2/Packages"
                  f"?$filter=Id+eq+'{mod_id}'+and+IsLatestVersion+eq+true"
              )
              req = urllib.request.Request(url, headers={"Accept": "application/atom+xml"})
              with urllib.request.urlopen(req, timeout=30) as resp:
                  xml_data = resp.read().decode("utf-8")
              root = ET.fromstring(xml_data)
              entries = root.findall("atom:entry", ns)
              if not entries:
                  return None
              props = entries[0].find("m:properties", ns)
              if props is None:
                  return None
              version  = props.findtext("d:Version",       default="", namespaces=ns).strip()
              dl_count = props.findtext("d:DownloadCount", default="0", namespaces=ns).strip()
              try:
                  downloads = int(dl_count)
              except (ValueError, TypeError):
                  downloads = 0
              return version, downloads

          # Step 1: Discover modules via batch query to find all VB* modules owned by Vibhu_Bhatnagar
          search_url = (
              "https://www.powershellgallery.com/api/v2/Packages"
              "?$filter=startswith(Id,'VB')"
              "+and+IsLatestVersion+eq+true"
              "&$orderby=Id"
          )
          req = urllib.request.Request(search_url, headers={"Accept": "application/atom+xml"})
          with urllib.request.urlopen(req, timeout=30) as resp:
              xml_data = resp.read().decode("utf-8")

          root = ET.fromstring(xml_data)
          owned_ids = []
          for entry in root.findall("atom:entry", ns):
              props = entry.find("m:properties", ns)
              if props is None:
                  continue
              mod_id = props.findtext("d:Id", default="", namespaces=ns).strip()
              owners = props.findtext("d:Owners", default="", namespaces=ns).strip()
              if mod_id and "Vibhu_Bhatnagar" in owners:
                  owned_ids.append(mod_id)

          if not owned_ids:
              print("No modules found matching VB* owned by Vibhu_Bhatnagar.")
              exit(0)

          # Step 2: Fetch each module individually for accurate, fresh download counts
          discovered = {}
          for mod_id in owned_ids:
              result = fetch_module(mod_id)
              if result is None:
                  print(f"WARNING: Could not fetch data for {mod_id}, skipping.")
                  continue
              version, downloads = result
              discovered[mod_id] = {"version": version, "downloads": downloads}
              print(f"  {mod_id}: v{version}, {downloads:,} downloads")

          if not discovered:
              print("No modules could be fetched.")
              exit(0)

          print(f"Discovered {len(discovered)} module(s): {list(discovered.keys())}")

          # Compute totals across all discovered modules
          total_packages  = len(discovered)
          total_downloads = sum(info["downloads"] for info in discovered.values())
          print(f"Totals: {total_packages} packages, {total_downloads:,} downloads")

          # Read README
          with open(README_PATH, "r", encoding="utf-8") as f:
              readme = f.read()

          # Update total-packages and total-downloads badges (HTML img tags render reliably in GitHub READMEs)
          pkg_badge = (
              f'<img src="https://img.shields.io/badge/packages-{total_packages}-5391FE?style=flat&logo=powershell&logoColor=white"'
              f' alt="{total_packages} packages" />'
          )
          dl_total_fmt = f"{total_downloads:,}".replace(",", "--")
          dl_total_badge = (
              f'<img src="https://img.shields.io/badge/total%20downloads-{dl_total_fmt}-5391FE?style=flat&logo=powershell&logoColor=white"'
              f' alt="{total_downloads:,} total downloads" />'
          )
          readme = re.sub(
              r"(<!-- PSGALLERY-TOTAL-PACKAGES -->).*?(<!-- /PSGALLERY-TOTAL-PACKAGES -->)",
              rf"\g<1>{pkg_badge}\g<2>",
              readme, flags=re.DOTALL
          )
          readme = re.sub(
              r"(<!-- PSGALLERY-TOTAL-DOWNLOADS -->).*?(<!-- /PSGALLERY-TOTAL-DOWNLOADS -->)",
              rf"\g<1>{dl_total_badge}\g<2>",
              readme, flags=re.DOTALL
          )

          # Update existing rows, queue new modules
          new_modules = []
          for mod_id, info in discovered.items():
              version   = info["version"]
              downloads = info["downloads"]
              if not version:
                  print(f"WARNING: Empty version for {mod_id}, skipping.")
                  continue

              dl_formatted = f"{int(downloads):,}"
              print(f"{mod_id}: v{version}, {dl_formatted} downloads")

              ver_badge = f"![v{version}](https://img.shields.io/badge/version-{version}-5391FE?style=flat)"
              dl_badge  = f"![{dl_formatted} downloads](https://img.shields.io/badge/downloads-{dl_formatted.replace(',', '--')}-5391FE?style=flat)"

              ver_marker_open  = f"<!-- PSGALLERY-VERSION:{mod_id} -->"
              ver_marker_close = f"<!-- /PSGALLERY-VERSION:{mod_id} -->"
              dl_marker_open   = f"<!-- PSGALLERY-DL:{mod_id} -->"
              dl_marker_close  = f"<!-- /PSGALLERY-DL:{mod_id} -->"

              if ver_marker_open in readme:
                  # Module already in table — update badges in place
                  readme = re.sub(
                      rf"({re.escape(ver_marker_open)}).*?({re.escape(ver_marker_close)})",
                      rf"\1{ver_badge}\2",
                      readme, flags=re.DOTALL
                  )
                  readme = re.sub(
                      rf"({re.escape(dl_marker_open)}).*?({re.escape(dl_marker_close)})",
                      rf"\1{dl_badge}\2",
                      readme, flags=re.DOTALL
                  )
              else:
                  # New module — add a row to the table
                  new_modules.append((mod_id, ver_badge, dl_badge,
                                      ver_marker_open, ver_marker_close,
                                      dl_marker_open,  dl_marker_close))

          # Insert new rows before the end marker
          TABLE_END_MARKER = "<!-- PSGALLERY-TABLE-END -->"
          for (mod_id, ver_badge, dl_badge, vmo, vmc, dmo, dmc) in new_modules:
              psgallery_link = f"https://www.powershellgallery.com/packages/{mod_id}"
              new_row = (
                  f"| [{mod_id}]({psgallery_link}) "
                  f"| {vmo}{ver_badge}{vmc} "
                  f"| {dmo}{dl_badge}{dmc} "
                  f"| See PSGallery for details. |\n"
              )
              if TABLE_END_MARKER in readme:
                  readme = readme.replace(TABLE_END_MARKER, new_row + TABLE_END_MARKER)
                  print(f"Added new row for {mod_id}")
              else:
                  print(f"WARNING: TABLE_END_MARKER not found -- cannot auto-add row for {mod_id}.")

          # Write README
          with open(README_PATH, "w", encoding="utf-8") as f:
              f.write(readme)

          print("README updated successfully.")
          PYEOF

      - name: Commit updated README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit." || (git commit -m "chore: update PSGallery module stats [skip ci]" && git push)

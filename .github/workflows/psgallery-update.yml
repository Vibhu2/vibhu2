name: Update PSGallery module stats

on:
  schedule:
    # Runs daily at midnight IST (18:30 UTC)
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-psgallery-stats:
    name: Fetch PSGallery version + downloads and update README
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch PSGallery stats and update README
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import re
          import html.parser

          PSGALLERY_OWNER = "Vibhu_Bhatnagar"
          README_PATH = "README.md"

          # Step 1: Scrape the PSGallery profile page to get only YOUR modules
          class ProfileParser(html.parser.HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.modules = []

              def handle_starttag(self, tag, attrs):
                  if tag == "a":
                      attrs_dict = dict(attrs)
                      href = attrs_dict.get("href", "")
                      if href.startswith("/packages/") and href.count("/") == 2:
                          mod_name = href.split("/packages/")[1].rstrip("/")
                          if mod_name and mod_name not in self.modules:
                              self.modules.append(mod_name)

          profile_url = f"https://www.powershellgallery.com/profiles/{PSGALLERY_OWNER}"
          req = urllib.request.Request(profile_url, headers={"User-Agent": "Mozilla/5.0"})
          with urllib.request.urlopen(req, timeout=30) as resp:
              html_data = resp.read().decode("utf-8")

          parser = ProfileParser()
          parser.feed(html_data)
          module_names = parser.modules

          if not module_names:
              print(f"No modules found on profile for '{PSGALLERY_OWNER}'")
              exit(0)

          print(f"Found {len(module_names)} module(s): {module_names}")

          # Step 2: Fetch latest version + downloads for each module
          discovered = {}
          for mod_id in module_names:
              url = (
                  "https://www.powershellgallery.com/api/v2/FindPackagesById()"
                  f"?id='{mod_id}'&$filter=IsLatestVersion+eq+true"
              )
              try:
                  req2 = urllib.request.Request(url, headers={"Accept": "application/json"})
                  with urllib.request.urlopen(req2, timeout=15) as resp2:
                      data = json.loads(resp2.read().decode())
                  entry = data.get("d", {}).get("results", [{}])[0]
                  version   = entry.get("Version", "")
                  downloads = int(entry.get("DownloadCount", 0))
                  discovered[mod_id] = {"version": version, "downloads": downloads}
              except Exception as e:
                  print(f"WARNING: Could not fetch {mod_id}: {e}")

          # Step 3: Read README
          with open(README_PATH, "r", encoding="utf-8") as f:
              readme = f.read()

          # Step 4: Update existing rows, queue new modules
          new_modules = []
          for mod_id, info in discovered.items():
              version   = info["version"]
              downloads = info["downloads"]
              if not version:
                  print(f"WARNING: Empty version for {mod_id}, skipping.")
                  continue

              dl_formatted = f"{int(downloads):,}"
              print(f"{mod_id}: v{version}, {dl_formatted} downloads")

              ver_badge = f"![v{version}](https://img.shields.io/badge/version-{version}-5391FE?style=flat)"
              dl_badge  = f"![{dl_formatted} downloads](https://img.shields.io/badge/downloads-{dl_formatted.replace(',', '--')}-5391FE?style=flat)"

              ver_marker_open  = f"<!-- PSGALLERY-VERSION:{mod_id} -->"
              ver_marker_close = f"<!-- /PSGALLERY-VERSION:{mod_id} -->"
              dl_marker_open   = f"<!-- PSGALLERY-DL:{mod_id} -->"
              dl_marker_close  = f"<!-- /PSGALLERY-DL:{mod_id} -->"

              if ver_marker_open in readme:
                  readme = re.sub(
                      rf"({re.escape(ver_marker_open)}).*?({re.escape(ver_marker_close)})",
                      rf"\1{ver_badge}\2",
                      readme, flags=re.DOTALL
                  )
                  readme = re.sub(
                      rf"({re.escape(dl_marker_open)}).*?({re.escape(dl_marker_close)})",
                      rf"\1{dl_badge}\2",
                      readme, flags=re.DOTALL
                  )
              else:
                  new_modules.append((mod_id, ver_badge, dl_badge,
                                      ver_marker_open, ver_marker_close,
                                      dl_marker_open,  dl_marker_close))

          # Step 5: Insert new module rows into table
          TABLE_END_MARKER = "<!-- PSGALLERY-TABLE-END -->"
          for (mod_id, ver_badge, dl_badge, vmo, vmc, dmo, dmc) in new_modules:
              psgallery_link = f"https://www.powershellgallery.com/packages/{mod_id}"
              new_row = (
                  f"| [{mod_id}]({psgallery_link}) "
                  f"| {vmo}{ver_badge}{vmc} "
                  f"| {dmo}{dl_badge}{dmc} "
                  f"| See PSGallery for details. |\n"
              )
              if TABLE_END_MARKER in readme:
                  readme = readme.replace(TABLE_END_MARKER, new_row + TABLE_END_MARKER)
                  print(f"Added new row for {mod_id}")
              else:
                  print(f"WARNING: TABLE_END_MARKER not found -- cannot auto-add row for {mod_id}.")

          # Step 6: Write README
          with open(README_PATH, "w", encoding="utf-8") as f:
              f.write(readme)

          print("README updated successfully.")
          PYEOF

      - name: Commit updated README if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit." || (git commit -m "chore: update PSGallery module stats [skip ci]" && git push)
